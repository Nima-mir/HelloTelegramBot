# fly.toml app configuration file generated for telegrammenubot2server on 2026-04-13T12:34:56+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'telegrammenubot2server'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
